<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-opacity="0.3" flood-color="#000000" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  
  <g filter="url(#shadow)">
    <!-- Document Base -->
    <path d="M 160 96 L 288 96 L 384 192 L 384 384 C 384 401.67 369.67 416 352 416 L 160 416 C 142.33 416 128 401.67 128 384 L 128 128 C 128 110.33 142.33 96 160 96 Z" fill="url(#paper)" />
    
    <!-- Fold -->
    <path d="M 288 96 L 288 160 C 288 177.67 302.33 192 320 192 L 384 192 Z" fill="#e2e8f0" />
  </g>
  
  <g fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-width="28">
    <path d="M 192 250 L 320 250" />
    <path d="M 192 314 L 280 314" />
    <path d="M 192 378 L 240 378" />
  </g>
  
  <!-- "CV" written on it in stylized dark color -->
  <text x="210" y="185" font-family="'Segoe UI', Helvetica, sans-serif" font-weight="900" font-size="76" fill="#1e1b4b" text-anchor="middle">CV</text>
  
  <!-- Little aesthetic dot -->
  <circle cx="340" cy="378" r="14" fill="#a855f7" />
